# This workflow builds and publishes the package to PyPI with uv when a release
# is created. See: https://docs.astral.sh/uv/guides/package/

name: PyPI

on:
  release:
    types: [published, edited]

jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.14
    - name: Run unit tests
      run: |
        uv sync --group dev --python 3.14
        uv run pytest -s tests/test_unit*
    - name: Build
      run: uv build
    - name: Publish
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: uv publish --trusted-publishing always
